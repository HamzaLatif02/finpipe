services:
  - type: web
    name: financial-pipeline-webapp
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn --chdir backend app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
